<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 84" width="440" height="84" role="img" aria-label="Golden Stone QLD — Concept D inverted">
  <!-- Black background -->
  <rect x="0" y="0" width="440" height="84" fill="#111111"/>

  <!-- Top face — gold (stands out strongly on black) -->
  <polygon points="4,38 20,20 76,20 60,38" fill="#B8922A"/>

  <!-- Front face — warm cream / off-white -->
  <rect x="4" y="38" width="56" height="28" fill="#F5F0E8"/>

  <!-- Right edge — dark gold -->
  <polygon points="60,38 76,20 76,48 60,66" fill="#7A5F1A"/>

  <!-- Surface highlight -->
  <line x1="4" y1="38" x2="60" y2="38" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>

  <!-- Wordmark in warm cream -->
  <text x="96" y="40"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="30" fill="#F5F0E8"
    letter-spacing="1.5">GOLDEN STONE</text>

  <!-- Gold accent rule -->
  <rect x="96" y="47" width="336" height="2" fill="#B8922A"/>

  <!-- Sub-label -->
  <text x="96" y="66"
    font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-weight="500" font-size="11" fill="#9E9790"
    letter-spacing="4.5">STONE MASONRY  ·  QLD</text>
</svg>
