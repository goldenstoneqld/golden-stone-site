<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 80" width="440" height="80" role="img" aria-label="Golden Stone QLD — Concept C wordmark">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&amp;family=DM+Sans:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- ── Structural gold bar — the only graphic element ── -->
  <rect x="0" y="0" width="440" height="3" fill="#B8922A"/>

  <!-- ── Two-tone wordmark ── -->
  <!-- "GOLDEN" in mature brass gold -->
  <text x="0" y="52"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="40" fill="#B8922A"
    letter-spacing="1">GOLDEN</text>

  <!-- Thin vertical separator — precision cut line -->
  <rect x="202" y="20" width="2" height="34" fill="#B8922A" opacity="0.4"/>

  <!-- "STONE" in deep black -->
  <text x="210" y="52"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="40" fill="#111111"
    letter-spacing="1">STONE</text>

  <!-- ── Sub-label ── -->
  <text x="0" y="70"
    font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-weight="500" font-size="11" fill="#9E9790"
    letter-spacing="4.5">STONE MASONRY  ·  QLD</text>
</svg>
