<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 84" width="420" height="84" role="img" aria-label="Golden Stone QLD logo — inverted">
  <!-- Dark background -->
  <rect x="0" y="0" width="420" height="84" fill="#2B3A52"/>

  <!-- ── Mark: GS Badge (white outline) ── -->
  <rect x="4" y="4" width="76" height="76" rx="5" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="18" y="56"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="44" fill="#FFFFFF"
    dominant-baseline="auto">G</text>
  <text x="40" y="56"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="44" fill="#7FB8D8"
    dominant-baseline="auto">S</text>
  <line x1="43" y1="18" x2="43" y2="68" stroke="#FFFFFF" stroke-width="1.2" opacity="0.3"/>

  <!-- ── Wordmark (white) ── -->
  <text x="102" y="38"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="30" fill="#FFFFFF"
    letter-spacing="1.8">GOLDEN STONE</text>
  <line x1="102" y1="46" x2="414" y2="46" stroke="#4A7FA5" stroke-width="1.5"/>
  <text x="102" y="64"
    font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-weight="500" font-size="11" fill="#B8AFA6"
    letter-spacing="4.5">STONE MASONRY  ·  QLD</text>
</svg>
