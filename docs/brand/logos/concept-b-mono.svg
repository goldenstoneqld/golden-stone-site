<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 84" width="420" height="84" role="img" aria-label="Golden Stone QLD logo — symbol monochrome">
  <!-- ── Mark: Bisected Diamond (monochrome) ── -->
  <!-- Top half: black -->
  <polygon points="42,6 78,42 6,42" fill="#1A1A1A"/>
  <!-- Bottom half: dark grey -->
  <polygon points="6,42 78,42 42,78" fill="#5C5C60"/>
  <!-- Precision cut line -->
  <line x1="6" y1="42" x2="78" y2="42" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Inner highlight -->
  <line x1="42" y1="6" x2="78" y2="42" stroke="#FFFFFF" stroke-width="0.8" opacity="0.25"/>

  <!-- ── Wordmark (black) ── -->
  <text x="102" y="38"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="30" fill="#1A1A1A"
    letter-spacing="1.8">GOLDEN STONE</text>
  <line x1="102" y1="46" x2="414" y2="46" stroke="#1A1A1A" stroke-width="1.5"/>
  <text x="102" y="64"
    font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-weight="500" font-size="11" fill="#5C5C60"
    letter-spacing="4.5">STONE MASONRY  ·  QLD</text>
</svg>
