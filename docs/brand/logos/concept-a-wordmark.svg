<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 84" width="420" height="84" role="img" aria-label="Golden Stone QLD logo">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&amp;family=DM+Sans:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- ── Mark: GS Badge ── -->
  <rect x="0" y="0" width="84" height="84" rx="6" fill="#2B3A52"/>
  <!-- G -->
  <text x="22" y="56"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="44" fill="#F7F5F2"
    dominant-baseline="auto">G</text>
  <!-- S — slightly overlapping, offset right, accent colour -->
  <text x="44" y="56"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="44" fill="#4A7FA5"
    dominant-baseline="auto">S</text>
  <!-- thin horizontal rule separating G from S -->
  <line x1="47" y1="18" x2="47" y2="68" stroke="#F7F5F2" stroke-width="1.2" opacity="0.25"/>

  <!-- ── Wordmark ── -->
  <text x="102" y="38"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="30" fill="#2B3A52"
    letter-spacing="1.8">GOLDEN STONE</text>
  <!-- Rule under wordmark -->
  <line x1="102" y1="46" x2="414" y2="46" stroke="#4A7FA5" stroke-width="1.5"/>
  <!-- Sub-label -->
  <text x="102" y="64"
    font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-weight="500" font-size="11" fill="#8A7D6E"
    letter-spacing="4.5">STONE MASONRY  ·  QLD</text>
</svg>
