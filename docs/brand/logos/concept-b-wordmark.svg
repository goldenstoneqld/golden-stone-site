<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 84" width="420" height="84" role="img" aria-label="Golden Stone QLD logo — symbol concept">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&amp;family=DM+Sans:wght@400;500&amp;display=swap');
    </style>
    <!-- Clip to top half of diamond -->
    <clipPath id="topHalf">
      <rect x="0" y="0" width="84" height="42"/>
    </clipPath>
    <!-- Clip to bottom half of diamond -->
    <clipPath id="bottomHalf">
      <rect x="0" y="42" width="84" height="42"/>
    </clipPath>
  </defs>

  <!-- ── Mark: Bisected Diamond (stone precision-cut symbol) ── -->
  <!-- Top half: slate navy -->
  <polygon points="42,6 78,42 6,42" fill="#2B3A52"/>
  <!-- Bottom half: steel blue -->
  <polygon points="6,42 78,42 42,78" fill="#4A7FA5"/>
  <!-- Precision cut line -->
  <line x1="6" y1="42" x2="78" y2="42" stroke="#F7F5F2" stroke-width="2"/>
  <!-- Inner highlight — top facet edge -->
  <line x1="42" y1="6" x2="78" y2="42" stroke="#F7F5F2" stroke-width="0.8" opacity="0.3"/>

  <!-- ── Wordmark ── -->
  <text x="102" y="38"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="30" fill="#2B3A52"
    letter-spacing="1.8">GOLDEN STONE</text>
  <line x1="102" y1="46" x2="414" y2="46" stroke="#4A7FA5" stroke-width="1.5"/>
  <text x="102" y="64"
    font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-weight="500" font-size="11" fill="#8A7D6E"
    letter-spacing="4.5">STONE MASONRY  ·  QLD</text>
</svg>
