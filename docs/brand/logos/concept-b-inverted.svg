<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 84" width="420" height="84" role="img" aria-label="Golden Stone QLD logo — symbol inverted">
  <!-- Dark background -->
  <rect x="0" y="0" width="420" height="84" fill="#2B3A52"/>

  <!-- ── Mark: Bisected Diamond (inverted — white/light on dark) ── -->
  <!-- Top half: white -->
  <polygon points="42,6 78,42 6,42" fill="#FFFFFF"/>
  <!-- Bottom half: light blue-grey -->
  <polygon points="6,42 78,42 42,78" fill="#7FB8D8"/>
  <!-- Precision cut line (dark to show against white) -->
  <line x1="6" y1="42" x2="78" y2="42" stroke="#2B3A52" stroke-width="2"/>
  <!-- Inner highlight -->
  <line x1="42" y1="6" x2="78" y2="42" stroke="#2B3A52" stroke-width="0.8" opacity="0.2"/>

  <!-- ── Wordmark (white) ── -->
  <text x="102" y="38"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="30" fill="#FFFFFF"
    letter-spacing="1.8">GOLDEN STONE</text>
  <line x1="102" y1="46" x2="414" y2="46" stroke="#7FB8D8" stroke-width="1.5"/>
  <text x="102" y="64"
    font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-weight="500" font-size="11" fill="#B8AFA6"
    letter-spacing="4.5">STONE MASONRY  ·  QLD</text>
</svg>
