<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 84" width="440" height="84" role="img" aria-label="Golden Stone QLD — Concept D monochrome">
  <!-- Top face — dark grey -->
  <polygon points="4,38 20,20 76,20 60,38" fill="#4A4A4A"/>

  <!-- Front face — near-black -->
  <rect x="4" y="38" width="56" height="28" fill="#111111"/>

  <!-- Right edge — medium grey -->
  <polygon points="60,38 76,20 76,48 60,66" fill="#787878"/>

  <!-- Surface highlight -->
  <line x1="4" y1="38" x2="60" y2="38" stroke="#AAAAAA" stroke-width="0.8" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="96" y="40"
    font-family="'Barlow Semi Condensed','Arial Narrow',Arial,sans-serif"
    font-weight="700" font-size="30" fill="#111111"
    letter-spacing="1.5">GOLDEN STONE</text>

  <!-- Rule -->
  <rect x="96" y="47" width="336" height="2" fill="#111111"/>

  <!-- Sub-label -->
  <text x="96" y="66"
    font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
    font-weight="500" font-size="11" fill="#5C5650"
    letter-spacing="4.5">STONE MASONRY  ·  QLD</text>
</svg>
